<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MojiQ Pro</title>
    <link rel="preload" href="/logo/MojiQ Pro_logo_WH.png" as="image" />
    <style id="splash-styles">
      body { margin: 0; overflow: hidden; }
      #html-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .splash-top {
        flex: 0 0 30%;
        background: #111111;
        display: flex;
        align-items: center;
        padding: 0 48px;
      }
      .splash-logo {
        height: 48px;
        user-select: none;
        -webkit-user-drag: none;
      }
      .splash-progress-track {
        height: 4px;
        background: #e0e0e0;
        flex-shrink: 0;
      }
      .splash-progress-fill {
        height: 100%;
        width: 0%;
        background: #0078d4;
        transition: width 0.3s ease-out;
      }
      .splash-bottom {
        flex: 1;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
      }
      .splash-message {
        font-size: 18px;
        color: #333;
        line-height: 1.8;
      }
      .splash-percent {
        font-size: 48px;
        font-weight: 700;
        color: #999;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="html-splash">
        <div class="splash-top" data-tauri-drag-region>
          <img src="/logo/MojiQ Pro_logo_WH.png" class="splash-logo" alt="MojiQ Pro" />
        </div>
        <div class="splash-progress-track">
          <div class="splash-progress-fill" id="splash-progress-fill"></div>
        </div>
        <div class="splash-bottom">
          <div class="splash-message">
            MojiQ Proを起動しています<br>しばらくお待ちください…
          </div>
          <div class="splash-percent" id="splash-percent">0%</div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        var fill = document.getElementById('splash-progress-fill');
        var pct = document.getElementById('splash-percent');
        var p = 0;
        var iv = setInterval(function() {
          p += Math.random() * 4 + 1;
          if (p > 30) { clearInterval(iv); p = 30; }
          if (fill) fill.style.width = p + '%';
          if (pct) pct.textContent = Math.round(p) + '%';
        }, 100);
        window.__splashInterval = iv;
        window.__splashProgress = function() { return p; };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
